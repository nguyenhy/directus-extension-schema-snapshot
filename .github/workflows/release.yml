name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write # CRITICAL: Allows OIDC authentication

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: '>=22.14.0'
      - run: npm install -g npm@11.18.0
      - run: npm ci
      # semantic-release detects OIDC automatically if NPM_TOKEN is absent
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}